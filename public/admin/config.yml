backend:
  name: github
  repo: adminvalepcd/valepcd
  branch: main # Altere para a branch principal de produção (ex: main ou master)

media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: "blog"
    label: "Artigos do Blog"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Data de Publicação", name: "date", widget: "datetime" }
      - { label: "Descrição/Resumo", name: "description", widget: "text" }
      - { label: "Imagem de Capa", name: "image", widget: "image", required: false }
      - { label: "Categoria", name: "category", widget: "select", options: ["Acessibilidade", "LGBTQI+", "Empresas", "Comunidade", "Eventos", "Outros"] }
      - { label: "Autor", name: "author", widget: "string", default: "Vale PCD" }
      - { label: "Corpo do Artigo", name: "body", widget: "markdown" }
